{% extends "layout.html" %} {% block content %}
<h2>Uploaded Items</h2>
{% if items %}
<ul>
    {% for item in items %}
    <li>
        <strong>{{ item.name }}</strong> — {{ item.description }}<br />
        <a href="https://{{ item.bucket }}.s3.amazonaws.com/{{ item.s3_key }}" target="_blank">
            {{ item.filename }}
          </a><br /> {{ item.uploaded_at }}
    </li>
    {% endfor %}
</ul>
{% else %}
<p>No items yet.</p>
{% endif %} {% endblock %}
