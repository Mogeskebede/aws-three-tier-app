<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <title>Login - Three-Tier Demo</title>
</head>

<body>
    <h2>Login</h2>
    {% if error %}
    <p style="color:red">{{ error }}</p>
    {% endif %}
    <form method="post" action="/login">
        <label>Bearer Token:</label>
        <input type="password" name="token" required />
        <button type="submit">Login</button>
    </form>
</body>

</html>
